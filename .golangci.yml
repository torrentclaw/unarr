version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - wastedassign
  settings:
    gosec:
      excludes:
        - G104  # Allow unhandled errors in fire-and-forget (notifications)
    errcheck:
      exclude-functions:
        - (*os/exec.Cmd).Start  # Fire-and-forget for notifications
    exhaustive:
      default-signifies-exhaustive: true
    misspell:
      locale: US
  exclusions:
    paths:
      - dist

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - dist
