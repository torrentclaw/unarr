run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - copyloopvar
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gofmt
    - goimports
    - misspell
    - nilerr
    - prealloc
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  gosec:
    excludes:
      - G104  # Allow unhandled errors in fire-and-forget (notifications)
  errcheck:
    exclude-functions:
      - (*os/exec.Cmd).Start  # Fire-and-forget for notifications
  exhaustive:
    default-signifies-exhaustive: true
  misspell:
    locale: US

issues:
  exclude-dirs:
    - dist
  max-issues-per-linter: 50
  max-same-issues: 5
